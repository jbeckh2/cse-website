name: Mirror to GitLab

on:
  push:
    branches:
      - master

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        run: |
          git remote add gitlab https://oauth2:${GITLAB_TOKEN}@gitlab.com/jbeckh2/cse-website.git
          git push gitlab master --force
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
